<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MapInterreg - Resultats</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --surface: #ffffff;
      --text: #202225;
      --muted: #6a6f75;
      --line: #dadede;
      --accent: #0a6f6a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f3f5f2 0%, var(--bg) 100%);
    }
    .container {
      max-width: 980px;
      margin: 24px auto;
      padding: 0 16px 24px;
    }
    h1 { margin: 0 0 10px; }
    p { color: var(--muted); margin: 0 0 14px; }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .btn {
      display: inline-block;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      text-decoration: none;
    }
    .btn:hover { border-color: var(--accent); }
    iframe {
      width: 100%;
      min-height: 620px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    @media (max-width: 700px) {
      iframe { min-height: 430px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Resultats de l'app</h1>
    <p>Version statique compatible Netlify (sans backend).</p>

    <section class="actions">
      <a class="btn" href="result/map_latest.html" target="_blank" rel="noopener">Ouvrir la carte</a>
      <a class="btn" href="result/map_latest.html" download>Telecharger la carte</a>
      <a class="btn" href="locations.csv" download>Telecharger locations.csv</a>
    </section>

    <iframe title="Carte" src="result/map_latest.html"></iframe>
  </main>
</body>
</html>
